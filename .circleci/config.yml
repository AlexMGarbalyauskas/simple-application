version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:18.20
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - persist_to_workspace:
          root: .
          paths:
            - .

  test:
    docker:
      - image: cimg/node:18.20
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Run tests
          command: npm test || echo "No tests found"

  security-scan:
    docker:
      - image: cimg/node:18.20
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Scan dependencies with npm audit
          command: npm audit --audit-level=high || true

  docker-build-and-push:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Validate required AWS and ECR variables
          command: |
            required_vars="AWS_REGION AWS_ACCOUNT_ID ECR_REPOSITORY AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY"
            for var_name in $required_vars; do
              if [ -z "${!var_name}" ]; then
                echo "Missing required environment variable: $var_name"
                exit 1
              fi
            done
      - run:
          name: Install AWS CLI
          command: |
            sudo apt-get update
            sudo apt-get install -y awscli
      - run:
          name: Verify AWS credentials
          command: aws sts get-caller-identity --region "$AWS_REGION"
      - run:
          name: Ensure ECR repository exists
          command: |
            aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" || \
            aws ecr create-repository --repository-name "$ECR_REPOSITORY" --region "$AWS_REGION"
      - run:
          name: Build Docker image
          command: docker build -t simpleapp:${CIRCLE_SHA1} .
      - run:
          name: Log in to Amazon ECR
          command: |
            aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
      - run:
          name: Tag and push image to ECR
          command: |
            docker tag simpleapp:${CIRCLE_SHA1} "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${CIRCLE_SHA1}"
            docker tag simpleapp:${CIRCLE_SHA1} "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest"
            docker push "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${CIRCLE_SHA1}"
            docker push "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest"

  deploy-elastic-beanstalk:
    docker:
      - image: cimg/aws:2023.06
    steps:
      - checkout
      - run:
          name: Bundle app source
          command: |
            zip -r app.zip . -x "node_modules/*" ".git/*"
      - run:
          name: Upload bundle to S3
          command: aws s3 cp app.zip "s3://$EB_S3_BUCKET/$CIRCLE_SHA1.zip"
      - run:
          name: Create Elastic Beanstalk application version
          command: |
            aws elasticbeanstalk create-application-version \
              --application-name "$EB_APP_NAME" \
              --version-label "$CIRCLE_SHA1" \
              --source-bundle S3Bucket="$EB_S3_BUCKET",S3Key="$CIRCLE_SHA1.zip" \
              --region "$AWS_REGION"
      - run:
          name: Enforce security group rules (least privilege)
          command: |
            SG_ID=$(aws ec2 describe-security-groups \
              --filters "Name=group-name,Values=awseb-e-*" \
              --region "$AWS_REGION" \
              --query 'SecurityGroups[0].GroupId' \
              --output text)
            echo "Enforcing rules on security group: $SG_ID"

            # Ensure port 80 is open
            aws ec2 authorize-security-group-ingress \
              --group-id "$SG_ID" --region "$AWS_REGION" \
              --protocol tcp --port 80 --cidr 0.0.0.0/0 2>/dev/null || true

            # Ensure port 443 is open
            aws ec2 authorize-security-group-ingress \
              --group-id "$SG_ID" --region "$AWS_REGION" \
              --protocol tcp --port 443 --cidr 0.0.0.0/0 2>/dev/null || true

            # Revoke direct Node/app port access from public internet
            aws ec2 revoke-security-group-ingress \
              --group-id "$SG_ID" --region "$AWS_REGION" \
              --protocol tcp --port 8080 --cidr 0.0.0.0/0 2>/dev/null || true
            aws ec2 revoke-security-group-ingress \
              --group-id "$SG_ID" --region "$AWS_REGION" \
              --protocol tcp --port 3000 --cidr 0.0.0.0/0 2>/dev/null || true

            echo "Security group rules enforced: only ports 80 and 443 open to public"
      - run:
          name: Deploy version to Elastic Beanstalk environment
          command: |
            aws elasticbeanstalk update-environment \
              --environment-name "$EB_ENV_NAME" \
              --version-label "$CIRCLE_SHA1" \
              --region "$AWS_REGION"
      - run:
          name: Wait for Elastic Beanstalk deployment to complete
          no_output_timeout: 10m
          command: |
            echo "Waiting for EB environment to become Ready..."
            for i in $(seq 1 40); do
              STATUS=$(aws elasticbeanstalk describe-environments \
                --environment-names "$EB_ENV_NAME" \
                --region "$AWS_REGION" \
                --query 'Environments[0].Status' \
                --output text)
              HEALTH=$(aws elasticbeanstalk describe-environments \
                --environment-names "$EB_ENV_NAME" \
                --region "$AWS_REGION" \
                --query 'Environments[0].HealthStatus' \
                --output text)
              echo "Attempt $i: Status=$STATUS Health=$HEALTH"
              if [ "$STATUS" = "Ready" ]; then
                echo "Environment is Ready!"
                exit 0
              fi
              sleep 15
            done
            echo "Timed out waiting for environment to be Ready"
            exit 1
      - run:
          name: Show deployed application link
          command: |
            echo "Application URL: http://simpleapp-env.eba-bxv6jbpd.eu-north-1.elasticbeanstalk.com/"

  verify-https:
    docker:
      - image: cimg/aws:2023.06
    steps:
      - run:
          name: Verify HTTPS endpoint and HSTS header
          command: |
            if [ -z "$APP_HTTPS_URL" ]; then
              cname=$(aws elasticbeanstalk describe-environments \
                --environment-names "$EB_ENV_NAME" \
                --region "$AWS_REGION" \
                --query 'Environments[0].CNAME' \
                --output text)

              if [ -z "$cname" ] || [ "$cname" = "None" ]; then
                echo "APP_HTTPS_URL is not set and environment CNAME could not be discovered"
                exit 1
              fi

              echo "Application URL: http://$cname"
              APP_HTTPS_URL="https://$cname"
            fi

            echo "Checking $APP_HTTPS_URL"
            headers=$(curl -sSIk --max-time 60 --retry 5 --retry-delay 10 --retry-connrefused "$APP_HTTPS_URL" 2>&1) || {
              echo "WARNING: Could not connect to $APP_HTTPS_URL (HTTPS may not be configured on this environment)"
              echo "Skipping HTTPS/HSTS check - configure SSL to enable HTTPS"
              exit 0
            }
            echo "$headers"

            if echo "$headers" | grep -qi '^strict-transport-security:'; then
              echo "HSTS header present - HTTPS security check passed"
            else
              echo "WARNING: Missing Strict-Transport-Security header"
            fi
      - run:
          name: Generate deployment artifact
          command: |
            mkdir -p /tmp/deployment
            CNAME=$(aws elasticbeanstalk describe-environments               --environment-names "$EB_ENV_NAME"               --region "$AWS_REGION"               --query 'Environments[0].CNAME'               --output text)
            echo $CNAME > /tmp/deployment/cname.txt
            echo "CNAME saved."
      - run:
          name: Write deployment HTML
          command: |
            CNAME=$(cat /tmp/deployment/cname.txt)
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Deployment</title>' > /tmp/deployment/open-app.html
            echo '<style>body{font-family:sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}' >> /tmp/deployment/open-app.html
            echo '.card{background:#1e293b;border-radius:16px;padding:40px;max-width:560px;width:100%}' >> /tmp/deployment/open-app.html
            echo 'h2{color:#4ade80}a{color:#38bdf8}.btn{display:block;background:#0ea5e9;color:white;padding:12px;border-radius:8px;text-decoration:none;text-align:center;font-weight:600;margin-top:16px}' >> /tmp/deployment/open-app.html
            echo '</style></head><body><div class="card"><h2>Deployment Successful</h2>' >> /tmp/deployment/open-app.html
            echo "<p>Live URL: <a href="http://$CNAME">http://$CNAME</a></p>" >> /tmp/deployment/open-app.html
            echo "<a class="btn" href="http://$CNAME" target="_blank">Open Application</a>" >> /tmp/deployment/open-app.html
            echo "<p style="color:#64748b;font-size:.85em;margin-top:16px">Build: $CIRCLE_BUILD_NUM | Branch: $CIRCLE_BRANCH</p>" >> /tmp/deployment/open-app.html
            echo '</div></body></html>' >> /tmp/deployment/open-app.html
            echo "HTML written. File size: $(wc -c < /tmp/deployment/open-app.html) bytes"
            ls -la /tmp/deployment/
      - store_artifacts:
          path: /tmp/deployment
          destination: deployment-info

workflows:
  build-test-security-docker-deploy:
    jobs:
      - build
      - test:
          requires:
            - build
      - security-scan:
          requires:
            - test
      - docker-build-and-push:
          requires:
            - security-scan
      - deploy-elastic-beanstalk:
          requires:
            - docker-build-and-push
      - verify-https:
          requires:
            - deploy-elastic-beanstalk
