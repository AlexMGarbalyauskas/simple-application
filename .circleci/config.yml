version: 2.1

jobs:
  build-and-test:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Run tests
          command: npm test || echo "No tests found"

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout

      - run:
          name: Plan a deploy
          command: |
            circleci run release plan \
              --environment-name="<environment-name>" \
              --component-name="<component-name>" \
              --target-version="<some-version-name>"

      - run:
          name: Update a deploy to SUCCESS
          command: circleci run release update --status=SUCCESS
          when: on_success

      - run:
          name: Update planned deploy to FAILED
          command: circleci run release update --status=FAILED
          when: on_fail

workflows:
  build-and-test:
    jobs:
      - build-and-test
      - deploy:
          requires:
            - build-and-test
